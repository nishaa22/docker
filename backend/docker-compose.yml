services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://db:27017/docker
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mongo
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      retries: 5

volumes:
  mongo-data: 